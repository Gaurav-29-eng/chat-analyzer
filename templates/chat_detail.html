<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Analyzer - {{ chat.title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <h1>Chat Analyzer</h1>
            <div class="nav-links">
                <a href="{{ url_for('index') }}">New Chat</a>
                <a href="{{ url_for('view_chats') }}">All Chats</a>
            </div>
        </nav>

        <main class="main-content">
            <div class="chat-detail">
                <div class="detail-header">
                    <h2>{{ chat.title }}</h2>
                    <span class="timestamp">{{ chat.created_at }}</span>
                </div>
                
                <div class="detail-content">
                    <h4>Summary</h4>
                    <div class="summary-box">
                        <p>{{ chat.summary }}</p>
                    </div>
                    
                    <h4>Full Content</h4>
                    <div class="content-box">
                        <pre>{{ chat.content }}</pre>
                    </div>
                </div>

                <div class="detail-actions">
                    <a href="{{ url_for('view_chats') }}" class="btn btn-secondary">← Back to All Chats</a>
                    <form action="{{ url_for('delete_chat', chat_id=chat.id) }}" method="POST">
                        <button type="submit" class="btn btn-delete" onclick="return confirm('Are you sure you want to delete this chat?')">Delete Chat</button>
                    </form>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
