<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View details of analyzed WhatsApp chat">
    <title>Chat Analyzer - {{ chat.title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <nav class="navbar" role="navigation" aria-label="Main navigation">
            <h1>Chat Analyzer</h1>
            <div class="nav-links">
                <a href="{{ url_for('index') }}">New Chat</a>
                <a href="{{ url_for('view_chats') }}">All Chats</a>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <article class="chat-detail">
                <!-- Chat Header -->
                <header class="detail-header">
                    <h2>{{ chat.title }}</h2>
                    <time class="timestamp" datetime="{{ chat.created_at }}">{{ chat.created_at }}</time>
                </header>
                
                <!-- Chat Content -->
                <div class="detail-content">
                    <!-- Summary Section -->
                    <section aria-labelledby="summary-heading">
                        <h4 id="summary-heading">Summary</h4>
                        <div class="summary-box">
                            <p>{{ chat.summary }}</p>
                        </div>
                    </section>
                    
                    <!-- Full Content Section -->
                    <section aria-labelledby="content-heading">
                        <h4 id="content-heading">Full Content</h4>
                        <div class="content-box">
                            <pre>{{ chat.content }}</pre>
                        </div>
                    </section>
                </div>

                <!-- Actions Footer -->
                <footer class="detail-actions">
                    <a href="{{ url_for('view_chats') }}" class="btn btn-secondary" aria-label="Back to all chats">
                        ← Back to All Chats
                    </a>
                    <form action="{{ url_for('delete_chat', chat_id=chat.id) }}" method="POST">
                        <button 
                            type="submit" 
                            class="btn btn-delete" 
                            onclick="return confirm('Are you sure you want to delete this chat?')"
                            aria-label="Delete this chat"
                        >
                            Delete Chat
                        </button>
                    </form>
                </footer>
            </article>
        </main>
    </div>
</body>
</html>
