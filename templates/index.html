<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Analyzer - New Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <h1>Chat Analyzer</h1>
            <div class="nav-links">
                <a href="{{ url_for('index') }}" class="active">New Chat</a>
                <a href="{{ url_for('view_chats') }}">All Chats</a>
            </div>
        </nav>

        <main class="main-content">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <div class="form-container">
                <h2>Add New Chat</h2>
                <form action="{{ url_for('submit_chat') }}" method="POST">
                    <div class="form-group">
                        <label for="title">Title</label>
                        <input type="text" id="title" name="title" placeholder="Enter chat title..." required>
                    </div>
                    
                    <div class="form-group">
                        <label for="content">Chat Content</label>
                        <textarea id="content" name="content" rows="15" placeholder="Paste your chat conversation here..." required></textarea>
                        <small class="hint">The first 2-3 lines will be automatically summarized.</small>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Save Chat</button>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
